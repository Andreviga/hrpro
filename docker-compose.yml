services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
      PAYROLL_WORKBOOK_PATH: ${PAYROLL_WORKBOOK_PATH}
    volumes:
      - ./Folha de pagamento de fevereiro 2026.xlsm:/app/Folha de pagamento de fevereiro 2026.xlsm:ro
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
    command: ["node", "dist/worker.js"]
    depends_on:
      - db
      - redis

volumes:
  db_data:
